<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | GrainCraft Studio</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neutral: {
              100: '#FAF8F5',
              200: '#F5F0E8',
              300: '#EDE7D9',
              400: '#D4C9B8',
              500: '#9C8E80',
              600: '#6B5D4F',
              700: '#4A4036',
              800: '#2A2420',
              900: '#1C1410',
            },
            accent: {
              DEFAULT: '#8B4A1C',
              hover: '#6B3614',
            },
          },
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Outfit', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <script src="../assets/js/main.js" defer></script>
  <style>
    .coming-soon-bg {
      background-color: #F5F0E8;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4c9b8' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .dark .coming-soon-bg {
      background-color: #1C1410;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232a2420' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
  </style>
</head>

<body class="font-body text-neutral-900 dark:text-neutral-100 bg-neutral-200 dark:bg-neutral-900 antialiased m-0 min-h-screen flex flex-col coming-soon-bg">
  <!-- Minimal header: logo + theme only -->
  <header class="flex justify-between items-center px-6 py-5 max-w-4xl mx-auto w-full">
    <a href="" class="inline-flex items-center gap-2.5 font-display text-xl font-semibold tracking-[0.05em] uppercase text-neutral-900 dark:text-white hover:text-accent transition-colors">
      <div class="w-6 h-6 flex-shrink-0" style="-webkit-mask: url('../assets/images/logo-icon.svg') no-repeat center; mask: url('../assets/images/logo-icon.svg') no-repeat center; background-color: currentColor;"></div>
      <span>GrainCraft</span>
    </a>
    <button id="theme-toggle" class="p-2.5 rounded-full border border-neutral-400/50 dark:border-neutral-600 text-current hover:bg-neutral-300/30 dark:hover:bg-neutral-700/30 transition-colors" aria-label="Toggle Dark Mode">
      <span class="iconify text-lg hidden dark:inline-block" data-icon="lucide:sun"></span>
      <span class="iconify text-lg inline-block dark:hidden" data-icon="lucide:moon"></span>
    </button>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="text-center max-w-lg mx-auto">
      <div class="mb-8 flex justify-center">
        <div class="w-16 h-16 flex-shrink-0 opacity-90" style="-webkit-mask: url('../assets/images/logo-icon.svg') no-repeat center; mask: url('../assets/images/logo-icon.svg') no-repeat center; background-color: currentColor;"></div>
      </div>
      <p class="font-accent uppercase tracking-[0.25em] text-[0.75rem] text-accent mb-4">Handcrafted furniture &amp; woodworking</p>
      <h1 class="font-display font-normal text-4xl sm:text-5xl md:text-6xl text-neutral-900 dark:text-white leading-tight mb-5">We're building something new.</h1>
      <p class="font-body text-neutral-600 dark:text-neutral-400 text-lg leading-relaxed mb-10">
        Our studio is taking shape. Be the first to know when we open our doors.
      </p>
      <form action="#" class="flex flex-col sm:flex-row gap-3 max-w-sm mx-auto" method="post">
        <input type="email" name="email" placeholder="Your email" required
          class="flex-1 min-w-0 px-3 py-2.5 text-[0.8125rem] rounded-xl bg-neutral-200 dark:bg-neutral-800 border border-neutral-400 dark:border-neutral-600 font-body text-neutral-900 dark:text-white placeholder:text-neutral-500 focus:outline-none focus:border-accent transition-colors text-center sm:text-left">
        <button type="submit" class="c-cta shrink-0">
          Notify me
        </button>
      </form>
    </div>
  </main>

  <footer class="py-4 text-center">
    <p class="font-body text-[0.8125rem] text-neutral-500 dark:text-neutral-500">&copy; GrainCraft Studio</p>
  </footer>

  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</body>

</html>
